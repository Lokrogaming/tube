name: Screenshot

on:
  push:
    branches:
      - main

jobs:
  screenshot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Pull latest version
        run: git pull
      
      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Install http-server
        run: npm install -g http-server

      - name: Start server
        run: |
          http-server dist -p 3000 &
          sleep 5

      - name: Install Playwright
        run: npx playwright install chromium

      - name: Create screenshot script
        run: |
          cat > screenshot.mjs << 'EOF'
          import { chromium } from 'playwright';
          import fs from 'fs';

          const routes = [
            { path: '/', name: 'home' },
            { path: '/contact', name: 'contact' },
            { path: '/team', name: 'team' },
            { path: '/about', name: 'about' },
            { path: '/projects', name: 'projects' }
          ];

          const browser = await chromium.launch();
          const page = await browser.newPage({
            viewport: {
              width: 1440,
              height: 900
            }
          });

          // optional: folder sicherstellen
          if (!fs.existsSync('screenshots')) {
            fs.mkdirSync('screenshots');
          }

          for (const route of routes) {
          await page.goto(`http://localhost:3000${route.path}`, {
          waitUntil: 'domcontentloaded'
          });

          // warten bis JS fertig + Layout stabil
           await page.waitForLoadState('networkidle').catch(() => {});
          await page.waitForTimeout(3000);

          await page.screenshot({
          path: `screenshots/${route.name}.png`,
          fullPage: true
          });

          console.log(`Screenshot saved: ${route.name}`);
          }

          await browser.close();
          EOF

      - name: Take screenshot
        run: node screenshot.mjs

      - name: Commit screenshot
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update screenshot"
